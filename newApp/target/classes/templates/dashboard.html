<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<body>
    <div layout:fragment="content">
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
            <!-- Client Card -->
            <div class="col">
                <div class="card stat-card bg-primary text-white">
                    <div class="card-body">
                        <div>
                            <a href="/clients" class="text-white text-decoration-none">
                                <h6 class="card-subtitle mb-2">Total Clients</h6>
                                <h2 class="card-title mb-0" th:text="${stats.totalClients}">0</h2>
                            </a>
                        </div>
                        <span class="material-icons stat-icon">people</span>
                    </div>
                </div>
            </div>
            <!-- Project Card -->
            <div class="col">
                <div class="card stat-card bg-success text-white">
                    <div class="card-body">
                        <div>
                            <h6 class="card-subtitle mb-2">Active Projects</h6>
                            <h2 class="card-title mb-0" th:text="${stats.activeProjects}">0</h2>
                        </div>
                        <span class="material-icons stat-icon">assignment</span>
                    </div>
                </div>
            </div>
            <!-- Task Card -->
            <div class="col">
                <div class="card stat-card bg-info text-white">
                    <div class="card-body">
                        <div>
                            <h6 class="card-subtitle mb-2">Pending Tasks</h6>
                            <h2 class="card-title mb-0" th:text="${stats.pendingTasks}">0</h2>
                        </div>
                        <span class="material-icons stat-icon">check_circle</span>
                    </div>
                </div>
            </div>
            <!-- Offer Card -->
            <div class="col">
                <div class="card stat-card bg-warning text-dark">
                    <div class="card-body">
                        <div>
                            <h6 class="card-subtitle mb-2">Open Offers</h6>
                            <h2 class="card-title mb-0" th:text="${stats.openOffers}">0</h2>
                        </div>
                        <span class="material-icons stat-icon">local_offer</span>
                    </div>
                </div>
            </div>
            <!-- Invoice Card -->
            <div class="col">
                <div class="card stat-card bg-danger text-white">
                    <div class="card-body">
                        <div>
                            <h6 class="card-subtitle mb-2">Unpaid Invoices</h6>
                            <h2 class="card-title mb-0" th:text="${stats.unpaidInvoices}">0</h2>
                        </div>
                        <span class="material-icons stat-icon">receipt</span>
                    </div>
                </div>
            </div>
            <!-- Payment Card -->
            <div class="col">
                <div class="card stat-card bg-secondary text-white">
                    <div class="card-body">
                        <div>
                            <h6 class="card-subtitle mb-2">Payments this Month</h6>
                            <h2 class="card-title mb-0" th:text="${stats.totalPaymentsMonth}">0</h2>
                        </div>
                        <span class="material-icons stat-icon">payment</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <!-- Recent Projects Table -->
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Recent Projects</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Project Name</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="project : ${recentProjects}">
                                    <td th:text="${project}">Project</td>
                                    <td><span class="badge bg-success">In Progress</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- Recent Invoices Table -->
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Recent Invoices</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Invoice #</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="invoice : ${recentInvoices}">
                                    <td th:text="${invoice}">INV-000</td>
                                    <td><span class="badge bg-warning text-dark">Pending</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

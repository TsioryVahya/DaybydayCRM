<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaybydayCRM - Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 250px;
            --brand-color: #5d59a6;
        }
        body {
            background-color: #f8f9fa;
        }
        #wrapper {
            display: flex;
            width: 100%;
        }
        #sidebar-wrapper {
            min-height: 100vh;
            width: var(--sidebar-width);
            background-color: #343a40;
            color: white;
            transition: all 0.3s;
        }
        #page-content-wrapper {
            width: 100%;
            padding: 20px;
        }
        .sidebar-heading {
            padding: 1.5rem 1rem;
            font-size: 1.2rem;
            background-color: var(--brand-color);
            font-weight: bold;
        }
        .list-group-item {
            border: none;
            background-color: transparent;
            color: rgba(255,255,255,0.8);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
        }
        .list-group-item:hover {
            background-color: rgba(255,255,255,0.1);
            color: white;
        }
        .list-group-item.active {
            background-color: var(--brand-color);
            color: white;
        }
        .material-icons {
            margin-right: 10px;
            font-size: 20px;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 20px;
        }
        .stat-card .card-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-icon {
            font-size: 40px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div th:replace="~{components/sidebar :: sidebar}"></div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4 rounded shadow-sm">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">Dashboard Overview</span>
                    <div class="d-flex">
                        <span class="text-muted">Welcome, Administrator</span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div layout:fragment="content">
                    <!-- Default content goes here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
